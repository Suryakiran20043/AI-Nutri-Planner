<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Grocery List — NutriPlan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link href="/assets/css/main.css" rel="stylesheet">
  <link href="/assets/css/theme-minimal.css" rel="stylesheet">
  <link href="/assets/css/components.css" rel="stylesheet">
  <link href="/assets/css/animations.css" rel="stylesheet">
  <link href="/assets/css/pages/grocery.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
</head>
<body>

  <div class="progress-bar" id="pbar" style="width:90%"></div>

  <div class="app">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    
    <main class="main">
      <div class="topbar animate-in">
        <div>
          <div class="page-title">Grocery <span>List</span></div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px" id="grocery-items-subtitle">For this week's meal plan · 0 items</div>
        </div>
        <div class="topbar-right">
          <button class="btn btn-outline" id="btn-generate-grocery">Build checklist</button>
          <button class="btn btn-lime">🛒 Order online</button>
          
          <div class="topbar-actions" style="display: flex; align-items: center; gap: 12px; margin-left: 12px; border-left: 1px solid var(--border); padding-left: 16px;">
            <a href="/settings" class="topbar-action-btn" title="Settings" style="width: 38px; height: 38px; border-radius: 50%; background: var(--white); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); text-decoration: none; font-size: 18px; transition: var(--transition);" onmouseover="this.style.borderColor='var(--sage)'; this.style.color='var(--sage)';" onmouseout="this.style.borderColor='var(--border)'; this.style.color='var(--muted)';">
              <i class="ti ti-settings"></i>
            </a>
          </div>
        </div>
      </div>

      <!-- Checklist totals progress strip matching mockup -->
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);" class="animate-in">
        <div style="font-size:20px">✅</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500" id="grocery-summary-title">0 of 0 items checked</div>
          <div style="height:4px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden">
            <div id="grocery-progress-fill" style="width:0%;height:100%;background:var(--sage);border-radius:2px;transition:width 0.4s;"></div>
          </div>
        </div>
        <button class="btn btn-outline" style="font-size:12px;padding:7px 14px" onclick="clearAllChecklist()">Clear checks</button>
      </div>

      <!-- Active week range selector strip -->
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;" class="animate-in">
        <button class="btn btn-ghost btn-sm" id="btn-prev-week"><i class="ti ti-chevron-left"></i> Previous</button>
        <div class="week-title" id="week-display-range" style="font-family:'Playfair Display',serif; font-size:15px; font-weight:600; color:var(--forest)">Current Week</div>
        <button class="btn btn-ghost btn-sm" id="btn-next-week">Next <i class="ti ti-chevron-right"></i></button>
      </div>

      <!-- Checklist categories list -->
      <div class="grocery-layout" id="grocery-sections" style="display:flex; flex-direction:column; gap:16px;">
        <!-- Generated by JS -->
      </div>

    </main>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/grocery.js"></script>
</body>
</html>
